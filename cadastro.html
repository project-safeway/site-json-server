<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
  </head>
  <body>
    <form id="formCadastro">
      <input type="text" id="cnpj" placeholder="CNPJ" required /><br />
      <input type="text" id="nome" placeholder="Nome" required /><br />
      <input
        type="text"
        id="razaoSocial"
        placeholder="Razão Social"
        required
      /><br />
      <input type="text" id="telefone" placeholder="Telefone" required /><br />
      <input type="text" id="cep" placeholder="CEP" required /><br />
      <input type="email" id="email" placeholder="E-mail" required /><br />
      <input type="password" id="senha" placeholder="Senha" required /><br />
      <button type="submit">Cadastrar</button>
    </form>

    <button id="btnLogin">Ir para Login</button>

    <!-- scripts -->
    <script src="cadastro.js"></script>
    <!------------->
  </body>
</html>
