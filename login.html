<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


    <title>SafeWay - Login</title>
  </head>
  <body>
    <main>
      <section class="formulario">
        <h2>Login</h2>
        <form id="formLogin">
          <label for="email">Email:</label>
          <input type="email" id="emailLogin" placeholder="E-mail" required />
          <br />
          <label for="password">Senha:</label>
          <input type="password" id="senhaLogin" placeholder="Senha" required />
          <br />
          <button class="botao-formulario" type="submit">Entrar</button>
        </form>
      
        <button class="botao-secundario" id="btnCadastrar">Cadastrar</button>

        <div id="div-mensagem-login"></div>

      </section>
    </main>
    <script src="login.js"></script>
    
  </body>
</html>
